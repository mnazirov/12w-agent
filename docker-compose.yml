services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-12w}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12w}
      POSTGRES_DB: 12w
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-12w} -d 12w"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    volumes:
      - mcp-data:/data
    environment:
      - MCP_DB_PATH=/data/motivation.db
      - MCP_PORT=8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8001), 3); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  google-calendar-mcp:
    build:
      context: .
      dockerfile: google_calendar_mcp/Dockerfile
    restart: unless-stopped
    environment:
      - MCP_PORT=8002
      - GOOGLE_CREDENTIALS_PATH=${GOOGLE_CREDENTIALS_PATH:-/secrets/credentials.json}
      - GOOGLE_TOKEN_PATH=${GOOGLE_TOKEN_PATH:-/secrets/token.json}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8002), 3); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  weather-mcp:
    build:
      context: ./weather_mcp
      dockerfile: Dockerfile
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8003
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8003),2); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://12w:12w@postgres:5432/12w}
      MCP_SERVER_URL: http://mcp-server:8001/sse
      GOOGLE_CALENDAR_MCP_URL: http://google-calendar-mcp:8002/sse
      WEATHER_MCP_URL: http://weather-mcp:8003/sse
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_TOKENS_ENCRYPTION_KEY: ${GOOGLE_TOKENS_ENCRYPTION_KEY:-}
      OAUTH_CALLBACK_PORT: 8080
    ports:
      - "${OAUTH_CALLBACK_PORT:-8080}:8080"
    depends_on:
      mcp-server:
        condition: service_started
      google-calendar-mcp:
        condition: service_started
      weather-mcp:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:3
    profiles: ["ngrok"]
    restart: unless-stopped
    depends_on:
      bot:
        condition: service_started
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      NGROK_DOMAIN: ${NGROK_DOMAIN:-}
    command:
      - "http"
      - "--authtoken"
      - "${NGROK_AUTHTOKEN:?NGROK_AUTHTOKEN is required}"
      - "--url"
      - "https://${NGROK_DOMAIN:?NGROK_DOMAIN is required for OAuth redirect}"
      - "bot:8080"

volumes:
  postgres_data:
  mcp-data:
