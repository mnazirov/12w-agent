services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-12w}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12w}
      POSTGRES_DB: 12w
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-12w} -d 12w"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    restart: unless-stopped
    volumes:
      - mcp-data:/data
    environment:
      - MCP_DB_PATH=/data/motivation.db
      - MCP_PORT=8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8001), 3); s.close()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://12w:12w@postgres:5432/12w}
      MCP_SERVER_URL: http://mcp-server:8001/sse
    depends_on:
      mcp-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mcp-data:
